name: CI and Deploy to EC2

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: fbr_pos_db
          POSTGRES_USER: fbr_pos_user
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fbr_pos_user -d fbr_pos_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        working-directory: fbr_pos_platform
        run: |
          sudo apt-get update
          sudo apt-get install -y libpq-dev
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Django system checks
        working-directory: fbr_pos_platform
        env:
          DJANGO_SETTINGS_MODULE: config.settings
          SECRET_KEY: test
          DEBUG: "False"
          DB_NAME: fbr_pos_db
          DB_USER: fbr_pos_user
          DB_PASSWORD: testpassword
          DB_HOST: localhost
          DB_PORT: "5432"
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_STORAGE_BUCKET_NAME: test
          EMAIL_HOST_USER: test@example.com
          EMAIL_HOST_PASSWORD: test
        run: python manage.py check

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build frontend
        working-directory: fbr_pos_frontend
        run: |
          npm ci --legacy-peer-deps
          npm run build

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy on EC2 over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            export APP_DIR=${{ secrets.EC2_APP_DIR }}
            export BRANCH=main
            bash $APP_DIR/deploy/scripts/deploy_ec2.sh
