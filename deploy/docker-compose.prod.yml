services:
  postgres:
    image: postgres:15
    container_name: fbr_postgres
    restart: unless-stopped
    profiles: ["local-db"]
    env_file:
      - ./env/postgres.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: fbr_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - internal

  backend:
    build:
      context: ../fbr_pos_platform
      dockerfile: dockerfile
    container_name: fbr_backend
    restart: unless-stopped
    env_file:
      - ./env/backend.env
    depends_on:
      - redis
    command: ["gunicorn", "--bind", "0.0.0.0:8000", "--workers", "4", "config.wsgi:application"]
    networks:
      - internal

  celery_worker:
    build:
      context: ../fbr_pos_platform
      dockerfile: dockerfile
    container_name: fbr_celery_worker
    restart: unless-stopped
    env_file:
      - ./env/backend.env
    depends_on:
      - redis
    command: ["celery", "-A", "config", "worker", "-l", "info", "--concurrency=4"]
    networks:
      - internal

  celery_beat:
    build:
      context: ../fbr_pos_platform
      dockerfile: dockerfile
    container_name: fbr_celery_beat
    restart: unless-stopped
    env_file:
      - ./env/backend.env
    depends_on:
      - redis
    command: ["celery", "-A", "config", "beat", "-l", "info", "--scheduler", "django_celery_beat.schedulers:DatabaseScheduler"]
    networks:
      - internal

  frontend:
    build:
      context: ../fbr_pos_frontend
      dockerfile: dockerfile
    container_name: fbr_frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - internal

  nginx:
    image: nginx:1.27-alpine
    container_name: fbr_nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/app.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_webroot:/var/www/certbot
      - letsencrypt:/etc/letsencrypt
    networks:
      - internal
      - public

  certbot:
    image: certbot/certbot:latest
    container_name: fbr_certbot
    profiles: ["certbot"]
    volumes:
      - certbot_webroot:/var/www/certbot
      - letsencrypt:/etc/letsencrypt
    networks:
      - public

volumes:
  postgres_data:
  redis_data:
  letsencrypt:
  certbot_webroot:

networks:
  internal:
    driver: bridge
  public:
    driver: bridge
